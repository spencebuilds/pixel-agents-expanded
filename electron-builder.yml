appId: com.spencebuilds.pixel-agents
productName: Pixel Agents
copyright: Copyright © 2024-2026 spencebuilds

directories:
  output: release/
  buildResources: build

files:
  - dist/**/*
  - package.json
  - scripts/**/*
  - assets/**/*
  - "!assets/premium/**/*"

publish:
  provider: github
  owner: spencebuilds
  repo: pixel-agents-expanded

mac:
  category: public.app-category.developer-tools
  target:
    - dmg
    - zip
  artifactName: ${productName}-${version}-${os}-${arch}.${ext}

win:
  target:
    - nsis
  artifactName: ${productName}-${version}-${os}-${arch}.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true

linux:
  target:
    - AppImage
  category: Development
  artifactName: ${productName}-${version}-${os}-${arch}.${ext}
